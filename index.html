<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Zone - Yılan Oyunu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 2rem 1rem 1rem;
        }

        header h1 {
            font-size: 2.5rem;
            color: #38bdf8;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        header p {
            color: #94a3b8;
            font-size: 1rem;
            margin-top: 0.25rem;
        }

        .game-card {
            background: #1e293b;
            padding: 1.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            text-align: center;
            margin-top: 1rem;
            border: 1px solid #334155;
            max-width: 450px;
            width: 90%;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 1rem;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .score {
            color: #4ade80;
        }

        canvas {
            background-color: #020617;
            border-radius: 0.5rem;
            border: 2px solid #334155;
            display: block;
            margin: 0 auto;
            max-width: 100%;
        }

        .controls {
            margin-top: 1.25rem;
        }

        button {
            background: #6366f1;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background: #4f46e5;
            transform: translateY(-2px);
        }

        .instructions {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #94a3b8;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <header>
        <h1>🎮 Arcade Zone</h1>
        <p>Web Tarayıcında Oyna</p>
    </header>

    <div class="game-card">
        <div class="stats">
            <div>Skor: <span id="score" class="score">0</span></div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="controls">
            <button onclick="startGame()">Oyunu Başlat</button>
        </div>

        <div class="instructions">
            Yön tuşlarını (⬆️ ⬇️ ⬅️ ➡️) veya <b>W-A-S-D</b> tuşlarını kullanarak yılanı yönet.
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let food = { x: 0, y: 0 };
        let dx = gridSize;
        let dy = 0;
        let score = 0;
        let gameInterval = null;
        let isRunning = false;

        function startGame() {
            snake = [
                { x: 10 * gridSize, y: 10 * gridSize },
                { x: 9 * gridSize, y: 10 * gridSize },
                { x: 8 * gridSize, y: 10 * gridSize }
            ];
            dx = gridSize;
            dy = 0;
            score = 0;
            scoreEl.textContent = score;
            placeFood();

            if (gameInterval) clearInterval(gameInterval);
            isRunning = true;
            gameInterval = setInterval(gameLoop, 100);
        }

        function placeFood() {
            food.x = Math.floor(Math.random() * tileCount) * gridSize;
            food.y = Math.floor(Math.random() * tileCount) * gridSize;
        }

        function gameLoop() {
            if (!isRunning) return;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Duvara çarpma kontrolü
            if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) {
                gameOver();
                return;
            }

            // Kendine çarpma kontrolü
            for (let i = 0; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            // Yem yeme kontrolü
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                placeFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function draw() {
            // Arka planı temizle
            ctx.fillStyle = "#020617";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Yem çizimi
            ctx.fillStyle = "#ef4444";
            ctx.beginPath();
            ctx.arc(food.x + gridSize / 2, food.y + gridSize / 2, gridSize / 2 - 2, 0, Math.PI * 2);
            ctx.fill();

            // Yılan çizimi
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? "#22c55e" : "#4ade80";
                ctx.fillRect(part.x + 1, part.y + 1, gridSize - 2, gridSize - 2);
            });
        }

        function gameOver() {
            isRunning = false;
            clearInterval(gameInterval);

            ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#f8fafc";
            ctx.font = "bold 24px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("OYUN BİTTİ!", canvas.width / 2, canvas.height / 2 - 10);
            
            ctx.font = "16px sans-serif";
            ctx.fillStyle = "#94a3b8";
            ctx.fillText("Skorun: " + score, canvas.width / 2, canvas.height / 2 + 20);
        }

        document.addEventListener("keydown", (e) => {
            if (!isRunning) return;
            const key = e.key.toLowerCase();
            
            if ((key === "arrowleft" || key === "a") && dx === 0) { dx = -gridSize; dy = 0; }
            if ((key === "arrowup" || key === "w") && dy === 0) { dx = 0; dy = -gridSize; }
            if ((key === "arrowright" || key === "d") && dx === 0) { dx = gridSize; dy = 0; }
            if ((key === "arrowdown" || key === "s") && dy === 0) { dx = 0; dy = gridSize; }
        });

        // Açılış ekranı
        ctx.fillStyle = "#020617";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#94a3b8";
        ctx.font = "16px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("Başlamak için 'Oyunu Başlat'a bas!", canvas.width / 2, canvas.height / 2);
    </script>
</body>
</html>
