<p><!DOCTYPE html> <html lang=&quot;tr&quot;> <head>  <meta charset=&quot;UTF-8&quot;>  <meta name=&quot;viewport&quot; content=&quot;width=device-width, initial-scale=1.0&quot;>  <title>Arcade Zone - Y&#305;lan Oyunu</title>  <style>  * {  margin: 0;  padding: 0;  box-sizing: border-box;  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;  }</p>

<p> <header>  <h1>&#55356;&#57262; Arcade Zone</h1>  <p>Web Taray&#305;c&#305;nda Oyna</p>  </header></p>

<p> <div class=&quot;game-card&quot;>  <div class=&quot;stats&quot;>  <div>Skor: <span id=&quot;score&quot; class=&quot;score&quot;>0</span></div>  </div></p>

<p> <canvas id=&quot;gameCanvas&quot; width=&quot;400&quot; height=&quot;400&quot;></canvas></p>

<p> <div class=&quot;controls&quot;>  <button onclick=&quot;startGame()&quot;>Oyunu Ba&#351;lat</button>  </div></p>

<p> <div class=&quot;instructions&quot;>  Y&ouml;n tu&#351;lar&#305;n&#305; (&#11014;&#65039; &#11015;&#65039; &#11013;&#65039; &#10145;&#65039;) veya <b>W-A-S-D</b> tu&#351;lar&#305;n&#305; kullanarak y&#305;lan&#305; y&ouml;net.  </div>  </div></p>

<p> <script>  const canvas = document.getElementById(&quot;gameCanvas&quot;);  const ctx = canvas.getContext(&quot;2d&quot;);  const scoreEl = document.getElementById(&quot;score&quot;);</p>

<p> const gridSize = 20;  const tileCount = canvas.width / gridSize;</p>

<p> let snake = [];  let food = { x: 0, y: 0 };  let dx = gridSize;  let dy = 0;  let score = 0;  let gameInterval = null;  let isRunning = false;</p>

<p> function startGame() {  snake = [  { x: 10 * gridSize, y: 10 * gridSize },  { x: 9 * gridSize, y: 10 * gridSize },  { x: 8 * gridSize, y: 10 * gridSize }  ];  dx = gridSize;  dy = 0;  score = 0;  scoreEl.textContent = score;  placeFood();</p>

<p> if (gameInterval) clearInterval(gameInterval);  isRunning = true;  gameInterval = setInterval(gameLoop, 100);  }</p>

<p> function placeFood() {  food.x = Math.floor(Math.random() * tileCount) * gridSize;  food.y = Math.floor(Math.random() * tileCount) * gridSize;  }</p>

<p> function gameLoop() {  if (!isRunning) return;</p>

<p> const head = { x: snake[0].x + dx, y: snake[0].y + dy };</p>

<p> // Duvara &ccedil;arpma kontrol&uuml;  if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) {  gameOver();  return;  }</p>

<p> // Kendine &ccedil;arpma kontrol&uuml;  for (let i = 0; i < snake.length; i++) {  if (snake[i].x === head.x &amp;&amp; snake[i].y === head.y) {  gameOver();  return;  }  }</p>

<p> snake.unshift(head);</p>

<p> // Yem yeme kontrol&uuml;  if (head.x === food.x &amp;&amp; head.y === food.y) {  score += 10;  scoreEl.textContent = score;  placeFood();  } else {  snake.pop();  }</p>

<p> draw();  }</p>

<p> function draw() {  // Arka plan&#305; temizle  ctx.fillStyle = &quot;#020617&quot;;  ctx.fillRect(0, 0, canvas.width, canvas.height);</p>

<p> // Yem &ccedil;izimi  ctx.fillStyle = &quot;#ef4444&quot;;  ctx.beginPath();  ctx.arc(food.x + gridSize / 2, food.y + gridSize / 2, gridSize / 2 - 2, 0, Math.PI * 2);  ctx.fill();</p>

<p> // Y&#305;lan &ccedil;izimi  snake.forEach((part, index) => {  ctx.fillStyle = index === 0 ? &quot;#22c55e&quot; : &quot;#4ade80&quot;;  ctx.fillRect(part.x + 1, part.y + 1, gridSize - 2, gridSize - 2);  });  }</p>

<p> function gameOver() {  isRunning = false;  clearInterval(gameInterval);</p>

<p> ctx.fillStyle = &quot;rgba(0, 0, 0, 0.8)&quot;;  ctx.fillRect(0, 0, canvas.width, canvas.height);</p>

<p> ctx.fillStyle = &quot;#f8fafc&quot;;  ctx.font = &quot;bold 24px sans-serif&quot;;  ctx.textAlign = &quot;center&quot;;  ctx.fillText(&quot;OYUN B&#304;TT&#304;!&quot;, canvas.width / 2, canvas.height / 2 - 10);    ctx.font = &quot;16px sans-serif&quot;;  ctx.fillStyle = &quot;#94a3b8&quot;;  ctx.fillText(&quot;Skorun: &quot; + score, canvas.width / 2, canvas.height / 2 + 20);  }</p>

<p> document.addEventListener(&quot;keydown&quot;, (e) => {  if (!isRunning) return;  const key = e.key.toLowerCase();    if ((key === &quot;arrowleft&quot; || key === &quot;a&quot;) &amp;&amp; dx === 0) { dx = -gridSize; dy = 0; }  if ((key === &quot;arrowup&quot; || key === &quot;w&quot;) &amp;&amp; dy === 0) { dx = 0; dy = -gridSize; }  if ((key === &quot;arrowright&quot; || key === &quot;d&quot;) &amp;&amp; dx === 0) { dx = gridSize; dy = 0; }  if ((key === &quot;arrowdown&quot; || key === &quot;s&quot;) &amp;&amp; dy === 0) { dx = 0; dy = gridSize; }  });</p>

<p> // A&ccedil;&#305;l&#305;&#351; ekran&#305;  ctx.fillStyle = &quot;#020617&quot;;  ctx.fillRect(0, 0, canvas.width, canvas.height);  ctx.fillStyle = &quot;#94a3b8&quot;;  ctx.font = &quot;16px sans-serif&quot;;  ctx.textAlign = &quot;center&quot;;  ctx.fillText(&quot;Ba&#351;lamak i&ccedil;in 'Oyunu Ba&#351;lat'a bas!&quot;, canvas.width / 2, canvas.height / 2);  </script> </body> </html></p>
